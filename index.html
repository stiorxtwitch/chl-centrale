<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHL — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#020b16;--panel:rgba(4,14,28,0.96);
      --blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.12);--blue-border:rgba(14,165,233,0.2);
      --text:#cce8f8;--muted:#4a8fa8;--green:#22c55e;--red:#ef4444;
    }
    body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    /* Animated BG */
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 80% 80% at 50% -20%,rgba(14,165,233,0.08),transparent),
                radial-gradient(ellipse 60% 60% at 80% 80%,rgba(14,165,233,0.05),transparent);
      animation:bgPulse 8s ease-in-out infinite alternate;}
    @keyframes bgPulse{0%{opacity:0.7}100%{opacity:1}}
    .grid-overlay{position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(14,165,233,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.04) 1px,transparent 1px);
      background-size:40px 40px;animation:gridMove 20s linear infinite;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
    /* Scanlines */
    .scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);}
    
    .login-wrap{position:relative;z-index:10;width:420px;}
    
    /* Top logo zone */
    .login-brand{text-align:center;margin-bottom:32px;}
    .brand-cross{width:64px;height:64px;margin:0 auto 16px;position:relative;filter:drop-shadow(0 0 20px rgba(14,165,233,0.6));}
    .brand-cross svg{width:64px;height:64px;}
    .brand-title{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;
      text-shadow:0 0 30px rgba(14,165,233,0.6),0 0 60px rgba(14,165,233,0.3);margin-bottom:4px;}
    .brand-sub{font-size:11px;letter-spacing:4px;color:var(--blue);text-transform:uppercase;opacity:0.8;}
    
    /* Card */
    .login-card{background:var(--panel);border:1px solid var(--blue-border);border-radius:8px;padding:36px;position:relative;
      box-shadow:0 0 60px rgba(14,165,233,0.08),0 25px 60px rgba(0,0,0,0.5);}
    .login-card::before,.login-card::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--blue);border-style:solid;}
    .login-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:2px 0 0 0;}
    .login-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 2px 0;}
    .card-top-line{position:absolute;top:0;left:20px;right:20px;height:1px;
      background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0.6;}
    
    .login-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;color:var(--blue);
      text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:8px;}
    .login-title::after{content:'';flex:1;height:1px;background:var(--blue-border);}
    
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;font-weight:600;}
    .field-wrap{position:relative;}
    .field-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;opacity:0.5;pointer-events:none;}
    .field input,.field select{width:100%;padding:12px 14px 12px 40px;background:rgba(14,165,233,0.05);
      border:1px solid var(--blue-border);border-radius:4px;color:var(--text);font-family:'Exo 2',sans-serif;
      font-size:14px;outline:none;transition:all 0.2s;appearance:none;}
    .field input::placeholder{color:rgba(100,168,204,0.3);}
    .field input:focus,.field select:focus{border-color:var(--blue);background:rgba(14,165,233,0.1);box-shadow:0 0 0 3px rgba(14,165,233,0.08);}
    .field select{cursor:pointer;}
    .field select option{background:#050d1a;color:var(--text);}
    
    .btn-login{width:100%;padding:14px;background:var(--blue);border:none;border-radius:4px;color:#fff;
      font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-top:8px;}
    .btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;}
    .btn-login:hover{background:#38bdf8;box-shadow:0 0 25px rgba(14,165,233,0.4);}
    .btn-login:hover::after{opacity:1;}
    .btn-login:active{transform:scale(0.99);}
    .btn-login:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none;}
    
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:11px;letter-spacing:2px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--blue-border);}
    
    .btn-register{width:100%;padding:12px;background:transparent;border:1px solid var(--blue-border);border-radius:4px;
      color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;
      text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .btn-register:hover{border-color:var(--blue);color:var(--text);background:var(--blue-dim);}
    
    .login-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:4px;
      padding:10px 14px;font-size:12px;color:#fca5a5;letter-spacing:1px;margin-bottom:16px;display:none;}
    .login-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:4px;
      padding:10px 14px;font-size:12px;color:#86efac;letter-spacing:1px;margin-bottom:16px;display:none;}
    
    /* Register panel */
    .register-panel{display:none;}
    .back-btn{background:none;border:none;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;
      letter-spacing:1px;cursor:pointer;padding:0;margin-bottom:18px;display:flex;align-items:center;gap:5px;transition:color 0.2s;}
    .back-btn:hover{color:var(--text);}
    
    .status-bar{text-align:center;margin-top:20px;font-size:10px;letter-spacing:2px;color:var(--muted);
      display:flex;align-items:center;justify-content:center;gap:6px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
      box-shadow:0 0 6px var(--green);animation:blinkDot 2s ease-in-out infinite;}
    @keyframes blinkDot{0%,100%{opacity:1}50%{opacity:0.3}}
    
    /* Loading spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;}
  </style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="scanlines"></div>

<div class="login-wrap">
  <div class="login-brand">
    <div class="brand-cross">
      <svg viewBox="0 0 64 64" fill="none">
        <rect x="24" y="4" width="16" height="56" rx="4" fill="#0ea5e9"/>
        <rect x="4" y="24" width="56" height="16" rx="4" fill="#0ea5e9"/>
        <rect x="26" y="6" width="12" height="52" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="6" y="26" width="52" height="12" rx="3" fill="rgba(255,255,255,0.15)"/>
      </svg>
    </div>
    <div class="brand-title">CHL</div>
    <div class="brand-sub">Centre Hospitalier de Liège — Système de Dispatch</div>
  </div>

  <div class="login-card">
    <div class="card-top-line"></div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel">
      <div class="login-title">🔐 Authentification</div>
      <div class="login-error" id="loginError"></div>
      <div class="login-success" id="loginSuccess"></div>
      <div class="field">
        <label>Identifiant</label>
        <div class="field-wrap">
          <span class="icon">👤</span>
          <input type="text" id="loginUser" placeholder="Votre identifiant..." autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="field-wrap">
          <span class="icon">🔑</span>
          <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Connexion</button>
      <div class="divider">ou</div>
      <button class="btn-register" onclick="showRegister()">Créer un compte</button>
    </div>

    <!-- REGISTER PANEL -->
    <div id="registerPanel" class="register-panel">
      <button class="back-btn" onclick="showLogin()">← Retour</button>
      <div class="login-title">📋 Nouveau compte</div>
      <div class="login-error" id="regError"></div>
      <div class="login-success" id="regSuccess"></div>
      <div class="field">
        <label>Identifiant</label>
        <div class="field-wrap">
          <span class="icon">👤</span>
          <input type="text" id="regUser" placeholder="Choisir un identifiant...">
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="field-wrap">
          <span class="icon">🔑</span>
          <input type="password" id="regPass" placeholder="••••••••">
        </div>
      </div>
      <div class="field">
        <label>Rôle médical</label>
        <div class="field-wrap">
          <span class="icon">🏥</span>
          <select id="regRole">
            <option value="stagiaire">Stagiaire</option>
            <option value="infirmier">Infirmier(e)</option>
            <option value="apprenti_medecin">Apprenti Médecin</option>
            <option value="apprenti_chirurgien">Apprenti Chirurgien</option>
            <option value="medecin">Médecin</option>
            <option value="chirurgien">Chirurgien</option>
          </select>
        </div>
      </div>
      <button class="btn-login" id="regBtn" onclick="doRegister()">Créer le compte</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    SYSTÈME OPÉRATIONNEL — CHL DISPATCH v2.0
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const sb = createClient(
    'https://gktawbaposndfxijkxdk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk'
  );

  function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
  function hideMsg(ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});}

  window.showRegister=()=>{
    document.getElementById('loginPanel').style.display='none';
    document.getElementById('registerPanel').style.display='block';
    hideMsg(['regError','regSuccess']);
  };
  window.showLogin=()=>{
    document.getElementById('registerPanel').style.display='none';
    document.getElementById('loginPanel').style.display='block';
    hideMsg(['loginError','loginSuccess']);
  };

  window.doLogin=async()=>{
    hideMsg(['loginError','loginSuccess']);
    const username=document.getElementById('loginUser').value.trim();
    const password=document.getElementById('loginPass').value;
    if(!username||!password){showError('loginError','Remplissez tous les champs.');return;}
    const btn=document.getElementById('loginBtn');
    btn.innerHTML='<span class="spinner"></span>Connexion...';btn.disabled=true;
    const{data:users,error}=await sb.from('chl_users').select('*').eq('username',username).eq('password',password);
    btn.innerHTML='Connexion';btn.disabled=false;
    if(error||!users||users.length===0){showError('loginError','Identifiant ou mot de passe incorrect.');return;}
    const user=users[0];
    await sb.from('chl_users').update({presence:true}).eq('id',user.id);
    user.presence=true;
    localStorage.setItem('chl_user',JSON.stringify(user));
    window.location.href='accueil.html';
  };

  window.doRegister=async()=>{
    hideMsg(['regError','regSuccess']);
    const username=document.getElementById('regUser').value.trim();
    const password=document.getElementById('regPass').value;
    const role=document.getElementById('regRole').value;
    if(!username||!password){showError('regError','Remplissez tous les champs.');return;}
    if(password.length<4){showError('regError','Mot de passe trop court (min 4 chars).');return;}
    const btn=document.getElementById('regBtn');
    btn.innerHTML='<span class="spinner"></span>Création...';btn.disabled=true;
    const{data:exists}=await sb.from('chl_users').select('id').eq('username',username);
    if(exists&&exists.length>0){showError('regError','Ce nom est déjà pris.');btn.innerHTML='Créer le compte';btn.disabled=false;return;}
    const{error}=await sb.from('chl_users').insert({username,password,role,permission:'user',presence:false});
    btn.innerHTML='Créer le compte';btn.disabled=false;
    if(error){showError('regError','Erreur création: '+error.message);return;}
    const sEl=document.getElementById('regSuccess');
    sEl.textContent='Compte créé ! Vous pouvez vous connecter.';sEl.style.display='block';
    setTimeout(()=>window.showLogin(),2000);
  };

  // Auto-redirect if already logged in
  const stored=localStorage.getItem('chl_user');
  if(stored){window.location.href='accueil.html';}
</script>
</body>
</html>
