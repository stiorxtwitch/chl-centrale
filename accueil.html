<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHL — Forum</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#040e1c;--panel:rgba(6,18,38,0.97);--sidebar-w:260px;
      --blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.12);--blue-border:rgba(14,165,233,0.2);
      --text:#cce8f8;--muted:#4a8fa8;
      --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;
      --medecin:#60a5fa;--chirurgien:#a78bfa;--infirmier:#34d399;
      --apprenti_chirurgien:#fb923c;--apprenti_medecin:#fbbf24;--stagiaire:#94a3b8;
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
      background-size:40px 40px;}
    
    /* HEADER */
    header{height:54px;background:rgba(2,8,20,0.99);border-bottom:1px solid var(--blue-border);
      display:flex;align-items:center;padding:0 0 0 16px;flex-shrink:0;position:relative;z-index:100;gap:0;}
    .hdr-logo{display:flex;align-items:center;gap:10px;padding-right:16px;border-right:1px solid var(--blue-border);}
    .hdr-logo svg{width:24px;height:24px;filter:drop-shadow(0 0 6px var(--blue));}
    .hdr-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:4px;color:#fff;}
    .hdr-nav{display:flex;height:100%;}
    .nav-item{display:flex;align-items:center;gap:7px;padding:0 18px;font-size:12px;font-weight:600;letter-spacing:1.5px;
      text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-decoration:none;}
    .nav-item:hover{color:var(--text);border-bottom-color:rgba(14,165,233,0.4);}
    .nav-item.active{color:var(--blue);border-bottom-color:var(--blue);}
    .nav-item .notif-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 16px;}
    .hdr-user{font-size:12px;color:var(--muted);letter-spacing:1px;}
    .hdr-user span{color:var(--text);font-weight:600;}
    .hdr-clock{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:600;color:var(--blue);
      letter-spacing:2px;padding:0 14px;border-left:1px solid var(--blue-border);border-right:1px solid var(--blue-border);}
    .btn{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
      padding:7px 14px;border:none;border-radius:3px;cursor:pointer;transition:all 0.2s;}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--blue-border);}
    .btn-ghost:hover{color:var(--text);border-color:var(--blue);}

    /* LAYOUT */
    .app-body{flex:1;display:flex;overflow:hidden;position:relative;z-index:1;}

    /* LEFT SIDEBAR — channels */
    .ch-sidebar{width:var(--sidebar-w);flex-shrink:0;background:rgba(2,8,20,0.98);border-right:1px solid var(--blue-border);
      display:flex;flex-direction:column;overflow-y:auto;}
    .ch-sidebar::-webkit-scrollbar{width:3px;}
    .ch-sidebar::-webkit-scrollbar-thumb{background:var(--blue-border);}
    .ch-section{padding:14px 14px 6px;}
    .ch-section-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:700;
      margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .ch-section-label::after{content:'';flex:1;height:1px;background:var(--blue-border);}
    .ch-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;cursor:pointer;
      transition:all 0.15s;font-size:13px;color:var(--muted);margin-bottom:2px;}
    .ch-item:hover{background:var(--blue-dim);color:var(--text);}
    .ch-item.active{background:rgba(14,165,233,0.18);color:var(--blue);font-weight:600;}
    .ch-item .ch-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
    .ch-item .unread{margin-left:auto;background:var(--blue);color:#fff;font-size:9px;font-weight:700;
      padding:1px 5px;border-radius:8px;}

    /* VOICE SECTION */
    .voice-section{border-top:1px solid var(--blue-border);margin-top:6px;}
    .voice-ch-item{padding:7px 10px 7px 14px;cursor:pointer;transition:all 0.15s;}
    .voice-ch-item:hover .voice-name{color:var(--text);}
    .voice-header-row{display:flex;align-items:center;gap:7px;}
    .voice-icon{font-size:13px;opacity:0.7;}
    .voice-name{font-size:12px;color:var(--muted);flex:1;}
    .voice-count{font-size:10px;color:var(--blue);background:var(--blue-dim);padding:1px 6px;border-radius:8px;}
    .voice-members-list{padding-left:32px;margin-top:4px;}
    .voice-member-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px;color:var(--muted);}
    .voice-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .voice-member-row.me .voice-dot{background:var(--blue);}
    .voice-member-row.me{color:var(--blue);}
    .btn-voice-join{font-size:10px;margin-left:auto;padding:2px 7px;border:1px solid var(--blue-border);border-radius:2px;
      background:transparent;color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:all 0.15s;}
    .btn-voice-join:hover{border-color:var(--green);color:var(--green);}
    .btn-voice-join.in-channel{border-color:var(--green);color:var(--green);background:rgba(34,197,94,0.1);}

    /* ONLINE USERS panel */
    .users-panel{width:200px;flex-shrink:0;background:rgba(2,8,20,0.97);border-left:1px solid var(--blue-border);
      display:flex;flex-direction:column;overflow-y:auto;}
    .users-panel::-webkit-scrollbar{width:3px;}
    .users-panel::-webkit-scrollbar-thumb{background:var(--blue-border);}
    .up-header{padding:12px 14px;border-bottom:1px solid var(--blue-border);}
    .up-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;}
    .up-user{display:flex;align-items:center;gap:8px;padding:7px 14px;transition:background 0.15s;cursor:default;}
    .up-user:hover{background:var(--blue-dim);}
    .up-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Rajdhani',sans-serif;}
    .up-name{font-size:12px;color:var(--text);font-weight:600;}
    .up-role{font-size:10px;color:var(--muted);}
    .up-status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;
      box-shadow:0 0 5px var(--green);}

    /* MAIN CHAT */
    .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:12px 18px;border-bottom:1px solid var(--blue-border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .chat-ch-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:#fff;}
    .chat-ch-desc{font-size:11px;color:var(--muted);letter-spacing:1px;}
    .chat-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:2px;}
    .chat-messages::-webkit-scrollbar{width:4px;}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--blue-border);border-radius:2px;}
    
    /* Message */
    .msg{padding:7px 10px;border-radius:4px;transition:background 0.1s;display:flex;gap:10px;align-items:flex-start;}
    .msg:hover{background:rgba(14,165,233,0.04);}
    .msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;}
    .msg-body{flex:1;min-width:0;}
    .msg-top{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
    .msg-author{font-weight:700;font-size:13px;}
    .msg-role-tag{font-size:9px;padding:1px 5px;border-radius:2px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
    .msg-time{font-size:10px;color:var(--muted);}
    .msg-content{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word;}
    .msg-pinned{border-left:2px solid var(--yellow);padding-left:10px;background:rgba(245,158,11,0.04);border-radius:0 4px 4px 0;}
    .msg-pinned .pin-label{font-size:9px;color:var(--yellow);letter-spacing:1px;margin-bottom:4px;}
    .msg-system{background:rgba(14,165,233,0.05);border:1px solid var(--blue-border);border-radius:4px;padding:10px 14px;
      font-size:12px;color:var(--muted);letter-spacing:1px;text-align:center;}
    .msg-intervention{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:6px;
      padding:12px 14px;margin:4px 0;}
    .int-header-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .int-badge{font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:3px;
      background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);}
    .int-code{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;}
    .int-prio{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
    .int-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;}
    .int-desc{font-size:12px;color:var(--text);line-height:1.5;}
    .int-meta{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
    .int-meta-item{font-size:10px;color:var(--muted);background:rgba(14,165,233,0.07);
      padding:3px 8px;border-radius:3px;border:1px solid var(--blue-border);}
    
    /* Date separator */
    .date-sep{display:flex;align-items:center;gap:12px;padding:12px 0;color:var(--muted);font-size:10px;letter-spacing:2px;}
    .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--blue-border);}
    
    /* Input zone */
    .chat-input-zone{padding:12px 18px;border-top:1px solid var(--blue-border);flex-shrink:0;}
    .chat-input-wrap{display:flex;align-items:flex-end;gap:8px;background:rgba(14,165,233,0.05);
      border:1px solid var(--blue-border);border-radius:6px;padding:10px 14px;transition:border-color 0.2s;}
    .chat-input-wrap:focus-within{border-color:var(--blue);}
    .chat-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);
      font-family:'Exo 2',sans-serif;font-size:13px;resize:none;max-height:120px;min-height:20px;line-height:1.4;}
    .chat-textarea::placeholder{color:rgba(100,168,204,0.3);}
    .send-btn{background:var(--blue);border:none;color:#fff;width:34px;height:34px;border-radius:3px;
      cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
    .send-btn:hover{background:#38bdf8;box-shadow:0 0 12px rgba(14,165,233,0.4);}
    .send-btn:disabled{background:var(--muted);cursor:not-allowed;}
    .typing-indicator{height:16px;font-size:10px;color:var(--muted);letter-spacing:1px;padding:2px 0;}

    /* Role colors */
    .rc-medecin{color:var(--medecin);}
    .rc-chirurgien{color:var(--chirurgien);}
    .rc-infirmier{color:var(--infirmier);}
    .rc-apprenti_chirurgien{color:var(--apprenti_chirurgien);}
    .rc-apprenti_medecin{color:var(--apprenti_medecin);}
    .rc-stagiaire{color:var(--stagiaire);}
    .rt-medecin{background:rgba(96,165,250,0.15);color:var(--medecin);}
    .rt-chirurgien{background:rgba(167,139,250,0.15);color:var(--chirurgien);}
    .rt-infirmier{background:rgba(52,211,153,0.15);color:var(--infirmier);}
    .rt-apprenti_chirurgien{background:rgba(251,146,60,0.15);color:var(--apprenti_chirurgien);}
    .rt-apprenti_medecin{background:rgba(251,191,36,0.15);color:var(--apprenti_medecin);}
    .rt-stagiaire{background:rgba(148,163,184,0.15);color:var(--stagiaire);}

    /* Empty state */
    .empty-ch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);}
    .empty-ch .icon{font-size:40px;opacity:0.4;}
    .empty-ch p{font-size:12px;letter-spacing:2px;text-transform:uppercase;}
  </style>
</head>
<body>

<header>
  <div class="hdr-logo">
    <svg viewBox="0 0 24 24" fill="none"><rect x="9" y="1" width="6" height="22" rx="2" fill="#0ea5e9"/><rect x="1" y="9" width="22" height="6" rx="2" fill="#0ea5e9"/></svg>
    <span class="hdr-title">CHL</span>
  </div>
  <nav class="hdr-nav">
    <a class="nav-item active" href="accueil.html">💬 Forum</a>
    <a class="nav-item" href="dispatch.html" id="navDispatch">🚨 Dispatch <span class="notif-badge" id="notifBadge" style="display:none">0</span></a>
  </nav>
  <div class="hdr-right">
    <div class="hdr-clock" id="clock">00:00:00</div>
    <div class="hdr-user">Connecté : <span id="userLabel">—</span></div>
    <button class="btn btn-ghost" onclick="handleLogout()">Déconnexion</button>
  </div>
</header>

<div class="app-body">

  <!-- SIDEBAR CHANNELS -->
  <div class="ch-sidebar">
    <div class="ch-section">
      <div class="ch-section-label">Texte</div>
      <div class="ch-item active" onclick="switchChannel('general',this)">
        <span class="ch-icon">#</span> Général
      </div>
      <div class="ch-item" onclick="switchChannel('annonces',this)">
        <span class="ch-icon">📢</span> Annonces
      </div>
      <div class="ch-item" onclick="switchChannel('medical',this)">
        <span class="ch-icon">🏥</span> Médical
      </div>
      <div class="ch-item" onclick="switchChannel('operations',this)">
        <span class="ch-icon">🚑</span> Opérations
      </div>
      <div class="ch-item" onclick="switchChannel('debrief',this)">
        <span class="ch-icon">📋</span> Débrief
      </div>
    </div>
    
    <div class="voice-section">
      <div class="ch-section" style="padding-bottom:4px;">
        <div class="ch-section-label">Salons Vocaux</div>
      </div>
      <div id="voice-channels-list"></div>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div class="chat-main">
    <div class="chat-header">
      <span class="ch-icon" id="chatIcon">#</span>
      <div>
        <div class="chat-ch-name" id="chatName">Général</div>
        <div class="chat-ch-desc" id="chatDesc">Canal de discussion général du CHL</div>
      </div>
    </div>
    <div class="chat-messages" id="msgList"></div>
    <div class="chat-input-zone">
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-textarea" id="msgInput" placeholder="Écrire un message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- ONLINE USERS -->
  <div class="users-panel">
    <div class="up-header">
      <div class="up-title">En ligne — <span id="onlineCount">0</span></div>
    </div>
    <div id="usersList"></div>
  </div>

</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const sb = createClient(
    'https://gktawbaposndfxijkxdk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk'
  );

  let currentUser = null;
  let currentChannel = 'general';
  let currentVoiceChannel = null;
  let allMessages = [];
  let typingTimeout = null;

  const ROLE_LABELS = {
    medecin:'Médecin',chirurgien:'Chirurgien',infirmier:'Infirmier',
    apprenti_chirurgien:'Appr. Chirurgien',apprenti_medecin:'Appr. Médecin',stagiaire:'Stagiaire'
  };
  const CH_INFO = {
    general:    {icon:'#',name:'Général',desc:'Canal de discussion général du CHL'},
    annonces:   {icon:'📢',name:'Annonces',desc:'Annonces officielles du CHL'},
    medical:    {icon:'🏥',name:'Médical',desc:'Discussions médicales et protocoles'},
    operations: {icon:'🚑',name:'Opérations',desc:'Coordination des interventions'},
    debrief:    {icon:'📋',name:'Débrief',desc:'Retours sur les interventions'},
  };
  const AVATAR_COLORS = ['#0ea5e9','#a855f7','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];
  
  function getColor(name) {
    let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;
    return AVATAR_COLORS[Math.abs(h)];
  }
  function initials(name){return name.slice(0,2).toUpperCase();}
  function fmtTime(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
  function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}

  function updateClock(){
    const n=new Date();
    document.getElementById('clock').textContent=
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock,1000); updateClock();

  window.switchChannel = function(ch, el) {
    document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    currentChannel = ch;
    const info = CH_INFO[ch] || {icon:'#',name:ch,desc:''};
    document.getElementById('chatIcon').textContent = info.icon;
    document.getElementById('chatName').textContent = info.name;
    document.getElementById('chatDesc').textContent = info.desc;
    loadMessages();
  };

  async function loadMessages() {
    const {data} = await sb.from('chl_forum_posts').select('*').eq('channel',currentChannel).order('created_at',{ascending:true}).limit(100);
    allMessages = data || [];
    renderMessages();
    checkNotifications();
  }

  function renderMessages() {
    const list = document.getElementById('msgList');
    if (allMessages.length === 0) {
      list.innerHTML = '<div class="empty-ch"><div class="icon">💬</div><p>Aucun message — soyez le premier !</p></div>';
      return;
    }
    let html = '';
    let lastDate = '';
    allMessages.forEach(msg => {
      const dateStr = fmtDate(msg.created_at);
      if (dateStr !== lastDate) {
        html += `<div class="date-sep">${dateStr}</div>`;
        lastDate = dateStr;
      }
      if (msg.content.startsWith('[INTERVENTION]')) {
        html += renderIntMsg(msg);
      } else {
        const color = getColor(msg.author_name);
        const roleLabel = ROLE_LABELS[msg.author_role] || msg.author_role;
        const pinned = msg.pinned ? '<div class="pin-label">📌 Message épinglé</div>' : '';
        html += `<div class="msg ${msg.pinned?'msg-pinned':''}">
          ${pinned}
          <div class="msg-avatar" style="background:${color}">${initials(msg.author_name)}</div>
          <div class="msg-body">
            <div class="msg-top">
              <span class="msg-author rc-${msg.author_role}">${msg.author_name}</span>
              <span class="msg-role-tag rt-${msg.author_role}">${roleLabel}</span>
              <span class="msg-time">${fmtTime(msg.created_at)}</span>
            </div>
            <div class="msg-content">${escHtml(msg.content)}</div>
          </div>
        </div>`;
      }
    });
    list.innerHTML = html;
    list.scrollTop = list.scrollHeight;
  }

  function renderIntMsg(msg) {
    try {
      const raw = msg.content.replace('[INTERVENTION]','');
      const d = JSON.parse(raw);
      const prioColor = {basse:'#86efac',normale:'#fcd34d',urgente:'#fb923c',critique:'#fca5a5'}[d.priorite]||'#fcd34d';
      return `<div class="msg">
        <div class="msg-avatar" style="background:#ef4444">🚨</div>
        <div class="msg-body">
          <div class="msg-top">
            <span class="msg-author" style="color:#fca5a5">${msg.author_name}</span>
            <span class="msg-role-tag" style="background:rgba(239,68,68,0.15);color:#fca5a5;">DISPATCH</span>
            <span class="msg-time">${fmtTime(msg.created_at)}</span>
          </div>
          <div class="msg-intervention">
            <div class="int-header-row">
              <span class="int-badge">🚨 INTERVENTION</span>
              <span class="int-code">${d.code}</span>
              <span class="int-prio" style="background:rgba(239,68,68,0.15);color:${prioColor};border:1px solid ${prioColor}40">${d.priorite?.toUpperCase()}</span>
            </div>
            <div class="int-title">${escHtml(d.titre)}</div>
            <div class="int-desc">${escHtml(d.description)}</div>
            <div class="int-meta">
              <span class="int-meta-item">📍 ${d.localisation||'Non précisé'}</span>
              <span class="int-meta-item">🚑 ${(d.units_assignees||[]).join(', ')||'Aucune unité'}</span>
              <span class="int-meta-item">👥 ${(d.membres_noms||[]).join(', ')||'Aucun intervenant'}</span>
            </div>
          </div>
        </div>
      </div>`;
    } catch { return ''; }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  window.sendMessage = async function() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content || !currentUser) return;
    document.getElementById('sendBtn').disabled = true;
    await sb.from('chl_forum_posts').insert({
      channel: currentChannel,
      author_id: currentUser.id,
      author_name: currentUser.username,
      author_role: currentUser.role,
      content
    });
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = false;
    await loadMessages();
  };

  window.handleKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
  };

  window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  async function loadOnlineUsers() {
    const {data} = await sb.from('chl_users').select('*').eq('presence',true);
    const users = data || [];
    document.getElementById('onlineCount').textContent = users.length;
    document.getElementById('usersList').innerHTML = users.map(u => {
      const color = getColor(u.username);
      return `<div class="up-user">
        <div class="up-avatar" style="background:${color}">${initials(u.username)}</div>
        <div><div class="up-name">${u.username}</div><div class="up-role">${ROLE_LABELS[u.role]||u.role}</div></div>
        <div class="up-status-dot"></div>
      </div>`;
    }).join('');
  }

  async function loadVoiceChannels() {
    const {data} = await sb.from('chl_voice_channels').select('*').order('id');
    const channels = data || [];
    const list = document.getElementById('voice-channels-list');
    list.innerHTML = channels.map(ch => {
      const members = ch.members_names || [];
      const inCh = currentVoiceChannel === ch.id;
      const meIn = members.includes(currentUser?.username);
      return `<div class="voice-ch-item">
        <div class="voice-header-row">
          <span class="voice-icon">🔊</span>
          <span class="voice-name">${ch.name}</span>
          ${members.length>0?`<span class="voice-count">${members.length}</span>`:''}
          <button class="btn-voice-join ${meIn?'in-channel':''}" onclick="toggleVoice(${ch.id},'${escHtml(ch.name)}')">
            ${meIn?'Quitter':'Rejoindre'}
          </button>
        </div>
        ${members.length>0?`<div class="voice-members-list">${members.map(m=>`
          <div class="voice-member-row ${m===currentUser?.username?'me':''}">
            <div class="voice-dot"></div>${m}
          </div>`).join('')}
        </div>`:''}
      </div>`;
    }).join('');
  }

  window.toggleVoice = async function(chId, chName) {
    if (!currentUser) return;
    const {data:ch} = await sb.from('chl_voice_channels').select('*').eq('id',chId).single();
    if (!ch) return;
    const members = ch.members || [];
    const names = ch.members_names || [];
    const alreadyIn = members.includes(currentUser.id);
    
    // Leave any other channel first
    if (currentVoiceChannel && currentVoiceChannel !== chId) {
      const {data:old} = await sb.from('chl_voice_channels').select('*').eq('id',currentVoiceChannel).single();
      if (old) {
        const om = (old.members||[]).filter(x=>x!==currentUser.id);
        const on = (old.members_names||[]).filter(x=>x!==currentUser.username);
        await sb.from('chl_voice_channels').update({members:om,members_names:on}).eq('id',currentVoiceChannel);
      }
    }
    
    if (alreadyIn) {
      const nm = members.filter(x=>x!==currentUser.id);
      const nn = names.filter(x=>x!==currentUser.username);
      await sb.from('chl_voice_channels').update({members:nm,members_names:nn}).eq('id',chId);
      currentVoiceChannel = null;
    } else {
      await sb.from('chl_voice_channels').update({members:[...members,currentUser.id],members_names:[...names,currentUser.username]}).eq('id',chId);
      currentVoiceChannel = chId;
    }
    await loadVoiceChannels();
  };

  async function checkNotifications() {
    const {data} = await sb.from('chl_interventions').select('id,lu_par').eq('statut','ouverte');
    if (!data || !currentUser) return;
    const unread = data.filter(i => !(i.lu_par||[]).includes(currentUser.id));
    const badge = document.getElementById('notifBadge');
    if (unread.length > 0) { badge.textContent = unread.length; badge.style.display = 'inline-block'; }
    else { badge.style.display = 'none'; }
  }

  async function init() {
    currentUser = JSON.parse(localStorage.getItem('chl_user'));
    if (!currentUser) { window.location.href = 'index.html'; return; }
    document.getElementById('userLabel').textContent = currentUser.username;
    await loadMessages();
    await loadOnlineUsers();
    await loadVoiceChannels();
    await checkNotifications();
    setInterval(async()=>{ await loadMessages(); await loadOnlineUsers(); await loadVoiceChannels(); await checkNotifications(); }, 5000);
  }

  window.handleLogout = async function() {
    if (currentVoiceChannel) {
      const {data:ch} = await sb.from('chl_voice_channels').select('*').eq('id',currentVoiceChannel).single();
      if (ch) {
        const nm=(ch.members||[]).filter(x=>x!==currentUser.id);
        const nn=(ch.members_names||[]).filter(x=>x!==currentUser.username);
        await sb.from('chl_voice_channels').update({members:nm,members_names:nn}).eq('id',currentVoiceChannel);
      }
    }
    await sb.from('chl_users').update({presence:false}).eq('id',currentUser.id);
    localStorage.removeItem('chl_user');
    window.location.href = 'index.html';
  };

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
